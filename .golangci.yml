# golangci-lint configuration for Synapse (schema v2).
# High-signal set. Some rules are tuned for what this project is: an execution and
# scanning tool that shells out via argv and does workspace file I/O by design.
version: "2"

run:
  timeout: 5m

linters:
  default: standard   # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
    - revive
    - gosec           # security linter, kept on for new code

  settings:
    revive:
      rules:
        # Style-only rules the project does not enforce repo-wide.
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: redefines-builtin-id
          disabled: true
    gosec:
      # These rules fire on the tool's core, reviewed behavior. Safety is enforced by the
      # architecture (argv-only exec, server-side scope + authorization gate, path validation,
      # bounded workspace walks), not by avoiding the pattern:
      #   G204 subprocess, G304 file path, G301/G302/G306 workspace perms, G115 int conversion,
      #   G118 background-job context, G122 bounded operator-dir walk, G203 documented template.URL
      #   for image data URIs (raster MIME only), G704 config-controlled LLM endpoint.
      excludes:
        - G115
        - G118
        - G122
        - G203
        - G204
        - G301
        - G302
        - G304
        - G306
        - G704

  exclusions:
    rules:
      # Tests may skip error checks and security rules on fixtures.
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      # Quickfix refactor hints (QF*) are suggestions, not defects; S1021 conflicts with the
      # recursive-closure idiom (a declared name the closure references).
      - linters:
          - staticcheck
        text: "(QF1001|QF1002|QF1003|S1021)"
      # A test exercises a still-present deprecated timestamp API on purpose.
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA1019"
