# Local development dependencies for Synapse.
# Usage: docker compose -f deploy/docker-compose.yml up -d
#
# Credentials are LOCAL DEV ONLY and are read from the environment with defaults.
# Override them for anything but a throwaway local stack, for example in a .env file
# next to this one (DB_USER, DB_PASSWORD, BLOB_USER, BLOB_PASSWORD).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${DB_USER:-synapse}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-synapse}"
      POSTGRES_DB: "${DB_NAME:-synapse}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${BLOB_USER:-synapse}"
      MINIO_ROOT_PASSWORD: "${BLOB_PASSWORD:-synapse-secret}"  # MinIO requires >= 8 chars; dev-only default
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
